<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MailBox UI - Business</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --surface-3: #eef3f9;
      --text: #1f2937;
      --muted: #64748b;
      --line: #d7e0ea;
      --line-2: #c7d2de;
      --accent: #2563eb;
      --accent-2: #0f766e;
      --danger: #dc2626;
      --warning: #b45309;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 16px;
      --radius-sm: 12px;
      --sidebar: #f8fbff;
      --toolbar: #ffffff;
      --list-selected: #e8f0ff;
      --chip: #eff4fa;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, #edf3fb 0%, #f5f8fc 38%, #eef3f9 100%);
      overflow: hidden;
    }

    button, input, select, textarea {
      font: inherit;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: 290px 390px 1fr;
      gap: 14px;
      padding: 14px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #fbfdff 0%, #f6f9fd 100%);
    }

    .brand {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #fff;
      font-size: 20px;
      box-shadow: 0 8px 16px rgba(37, 99, 235, 0.2);
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
      letter-spacing: .01em;
    }

    .brand p {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .sidebar-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
    }

    .compose-btn {
      appearance: none;
      border: 0;
      width: 100%;
      border-radius: 12px;
      padding: 13px 14px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent), #1d4ed8);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
      cursor: pointer;
      transition: transform .15s ease, filter .15s ease;
    }
    .compose-btn:hover { transform: translateY(-1px); filter: brightness(1.03); }

    .group-title {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .nav-list {
      display: grid;
      gap: 6px;
    }

    .nav-item {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      padding: 11px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, transform .15s ease;
      text-align: left;
    }

    .nav-item:hover, .nav-item.active {
      background: var(--surface-2);
      border-color: var(--line);
      transform: translateX(1px);
    }

    .nav-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .icon {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--chip);
      color: #334155;
      font-size: 13px;
      flex: 0 0 auto;
    }
    .nav-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      min-width: 26px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e8eef8;
      color: #334155;
      font-size: 12px;
      text-align: center;
      flex: 0 0 auto;
    }

    .stats {
      margin-top: auto;
      border-top: 1px solid var(--line);
      padding-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      padding: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
    }
    .stat strong { display:block; font-size: 20px; line-height: 1.1; }
    .stat span { display:block; margin-top: 4px; font-size: 12px; color: var(--muted); }

    .list-pane, .reader-pane {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: var(--surface);
    }

    .topbar {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }

    .search {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: 12px;
    }

    .search span { color: var(--muted); }
    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
    }
    .search input::placeholder { color: #94a3b8; }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #334155;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background .15s ease, transform .15s ease, border-color .15s ease;
      box-shadow: 0 1px 0 rgba(15,23,42,.02);
    }
    .action-btn:hover { background: #f8fbff; transform: translateY(-1px); border-color: var(--line-2); }

    .filters {
      padding: 12px 14px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--chip);
      color: #334155;
      padding: 8px 11px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      transition: background .15s ease, transform .15s ease, color .15s ease;
    }
    .chip:hover { transform: translateY(-1px); }
    .chip.active {
      background: #dbeafe;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }

    .mail-list {
      padding: 10px;
      overflow: auto;
      display: grid;
      gap: 8px;
    }

    .mail-item {
      border: 1px solid transparent;
      border-radius: 14px;
      background: #fff;
      padding: 14px;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, transform .15s ease, box-shadow .15s ease;
    }

    .mail-item:hover {
      background: #fcfdff;
      transform: translateY(-1px);
      border-color: #dbe5f0;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
    }

    .mail-item.active {
      background: var(--list-selected);
      border-color: #c7dcff;
    }

    .mail-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .mail-main { min-width: 0; }

    .sender {
      margin: 0 0 5px;
      font-size: 14px;
      font-weight: 700;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .subject {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: #1f2937;
      font-weight: 600;
    }

    .snippet {
      margin: 7px 0 0;
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--muted);
    }

    .meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
      flex: 0 0 auto;
    }

    .tag {
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .02em;
      border: 1px solid transparent;
    }
    .tag.work { background: #dbeafe; color: #1d4ed8; border-color: #bfdbfe; }
    .tag.personal { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
    .tag.design { background: #f3e8ff; color: #7e22ce; border-color: #e9d5ff; }
    .tag.alert { background: #fee2e2; color: #b91c1c; border-color: #fecaca; }

    .reader-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }

    .reader-title {
      display: grid;
      gap: 3px;
    }
    .reader-title small { color: var(--muted); font-size: 12px; }
    .reader-title strong { font-size: 15px; }

    .reader-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .reader {
      padding: 22px;
      overflow: auto;
      min-height: 0;
    }

    .reader h2 {
      margin: 0 0 12px;
      font-size: 26px;
      line-height: 1.3;
      letter-spacing: -.01em;
      color: #0f172a;
    }

    .reader-info {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .sender-block {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, #1d4ed8, #0f766e);
      flex: 0 0 auto;
      box-shadow: 0 10px 18px rgba(29, 78, 216, 0.16);
    }

    .sender-meta {
      min-width: 0;
    }

    .sender-meta .name {
      font-weight: 700;
      color: #0f172a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .message {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .message-body {
      width: 100%;
      padding: 18px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      line-height: 1.8;
      color: #334155;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.04);
    }

    .message-body p { margin: 0 0 12px; }
    .message-body p:last-child { margin-bottom: 0; }

    .signature {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    .empty-card {
      max-width: 340px;
      padding: 24px;
      border-radius: 18px;
      border: 1px dashed var(--line-2);
      background: #fbfdff;
    }

    .compose-modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.38);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 30;
      backdrop-filter: blur(6px);
    }

    .compose-modal.open { display: flex; }

    .compose {
      width: min(900px, 100%);
      max-height: 92vh;
      overflow: auto;
      border-radius: 20px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 24px 50px rgba(15, 23, 42, 0.18);
    }

    .compose-head {
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }

    .compose-head h3 {
      margin: 0;
      font-size: 16px;
    }

    .close-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #334155;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 20px;
    }

    .compose-body {
      padding: 18px;
      display: grid;
      gap: 14px;
      background: #fff;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    .field input, .field textarea, .field select {
      width: 100%;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      padding: 12px 13px;
      outline: 0;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }

    .field textarea {
      min-height: 220px;
      resize: vertical;
      line-height: 1.7;
    }

    .compose-footer {
      padding: 0 18px 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      background: #fff;
    }

    .secondary {
      color: var(--muted);
      font-size: 13px;
    }

    .send-btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent-2), #115e59);
      box-shadow: 0 10px 18px rgba(15, 118, 110, 0.18);
    }

    .muted-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #f59e0b;
      display: inline-block;
      flex: 0 0 auto;
    }

    .empty-state-icon {
      font-size: 42px;
      margin-bottom: 10px;
    }

    @media (max-width: 1120px) {
      body { overflow: auto; }
      .app {
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
      }
      .sidebar { order: 1; }
      .list-pane { order: 2; min-height: 640px; }
      .reader-pane { order: 3; min-height: 560px; }
    }

    @media (max-width: 640px) {
      .app { padding: 10px; gap: 10px; }
      .topbar, .reader-head, .brand { padding-left: 12px; padding-right: 12px; }
      .reader { padding: 16px; }
      .compose-body, .compose-footer { padding-left: 12px; padding-right: 12px; }
      .topbar { flex-direction: column; align-items: stretch; }
      .toolbar-actions { width: 100%; }
      .action-btn { flex: 1; }
      .reader-info { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar panel">
      <div class="brand">
        <div class="brand-mark">✉</div>
        <div>
          <h1>MailBox</h1>
          <p>Business mail workspace</p>
        </div>
      </div>

      <div class="sidebar-body">
        <button class="compose-btn" id="openCompose">＋ New Message</button>

        <div>
          <div class="group-title">Folders</div>
          <div class="nav-list">
            <button class="nav-item active" data-folder="inbox"><span class="nav-left"><span class="icon">📥</span><span class="nav-label">受信トレイ</span></span><span class="badge">8</span></button>
            <button class="nav-item" data-folder="sent"><span class="nav-left"><span class="icon">📤</span><span class="nav-label">送信済み</span></span><span class="badge">12</span></button>
            <button class="nav-item" data-folder="drafts"><span class="nav-left"><span class="icon">📝</span><span class="nav-label">下書き</span></span><span class="badge">3</span></button>
            <button class="nav-item" data-folder="trash"><span class="nav-left"><span class="icon">🗑️</span><span class="nav-label">削除済み</span></span><span class="badge">1</span></button>
          </div>
        </div>

        <div>
          <div class="group-title">Labels</div>
          <div class="nav-list">
            <button class="nav-item active" data-label="all"><span class="nav-left"><span class="icon">✨</span><span class="nav-label">すべて</span></span></button>
            <button class="nav-item" data-label="work"><span class="nav-left"><span class="icon">💼</span><span class="nav-label">仕事</span></span></button>
            <button class="nav-item" data-label="personal"><span class="nav-left"><span class="icon">👤</span><span class="nav-label">個人</span></span></button>
            <button class="nav-item" data-label="design"><span class="nav-left"><span class="icon">🎨</span><span class="nav-label">デザイン</span></span></button>
          </div>
        </div>

        <div class="stats">
          <div class="stat">
            <strong id="unreadCount">8</strong>
            <span>未読</span>
          </div>
          <div class="stat">
            <strong>98%</strong>
            <span>稼働率</span>
          </div>
        </div>
      </div>
    </aside>

    <section class="list-pane panel">
      <div class="topbar">
        <div class="search">
          <span>⌕</span>
          <input id="searchInput" type="text" placeholder="検索: 件名、差出人、本文" />
        </div>
        <div class="toolbar-actions">
          <button class="action-btn" id="markAllRead">Mark all read</button>
          <button class="action-btn" id="refreshBtn">Refresh</button>
        </div>
      </div>

      <div class="filters">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="unread">Unread</button>
        <button class="chip" data-filter="starred">Starred</button>
        <button class="chip" data-filter="today">Today</button>
      </div>

      <div class="mail-list" id="mailList"></div>
    </section>

    <section class="reader-pane panel">
      <div class="reader-head">
        <div class="reader-title">
          <small>Preview</small>
          <strong>選択したメール</strong>
        </div>
        <div class="reader-actions">
          <button class="action-btn" id="replyBtn">Reply</button>
          <button class="action-btn" id="archiveBtn">Archive</button>
          <button class="action-btn" id="deleteBtn">Delete</button>
        </div>
      </div>
      <div class="reader" id="reader"></div>
    </section>
  </div>

  <div class="compose-modal" id="composeModal" aria-hidden="true">
    <div class="compose" role="dialog" aria-modal="true" aria-label="新規メール作成">
      <div class="compose-head">
        <h3>新規メール作成</h3>
        <button class="close-btn" id="closeCompose">×</button>
      </div>
      <div class="compose-body">
        <div class="field">
          <label>宛先</label>
          <input type="email" placeholder="example@company.com" />
        </div>
        <div class="field">
          <label>件名</label>
          <input type="text" placeholder="件名を入力" />
        </div>
        <div class="field">
          <label>ラベル</label>
          <select>
            <option>仕事</option>
            <option>個人</option>
            <option>デザイン</option>
          </select>
        </div>
        <div class="field">
          <label>本文</label>
          <textarea placeholder="本文を入力してください..."></textarea>
        </div>
      </div>
      <div class="compose-footer">
        <div class="secondary">下書きでも送信でも、どちらでも業務は進みます。人類は締切でしか整わないので。</div>
        <button class="send-btn" id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script>
    const mails = [
      {
        id: 1,
        sender: 'Yamada / Product Team',
        email: 'product@company.jp',
        subject: '来週のリリーススケジュールについて',
        snippet: 'UIの最終確認をお願いします。素材の差し替えは明日15時までに反映できると助かります。',
        time: '09:24',
        date: '今日',
        label: 'work',
        tag: 'work',
        unread: true,
        starred: true,
        body: [
          'こんにちは。',
          '来週公開予定の画面について、最終レビューをお願いしたいです。特にボタンの配置とモバイル表示の崩れがないかを見てください。',
          '差し戻しがあれば今日中に共有できると助かります。よろしくお願いします。'
        ]
      },
      {
        id: 2,
        sender: 'Design Lab',
        email: 'hello@designlab.studio',
        subject: '新しいカラーパレット案を送ります',
        snippet: '彩度を抑えた案と、少しアクセントを強めた案を2パターン用意しました。',
        time: '08:10',
        date: '今日',
        label: 'design',
        tag: 'design',
        unread: true,
        starred: false,
        body: [
          'いつもありがとうございます。',
          '今回の提案では、落ち着いたネイビー系の案と、アクセントを強めた案をまとめています。',
          '比較しやすいように、ワイヤーと併記した資料も添付しています。'
        ]
      },
      {
        id: 3,
        sender: 'Sato',
        email: 'sato@example.com',
        subject: '週末の予定、どうする？',
        snippet: '駅近のカフェをいくつか見つけました。集合は昼前でも大丈夫です。',
        time: '昨日',
        date: '昨日',
        label: 'personal',
        tag: 'personal',
        unread: false,
        starred: true,
        body: [
          'やあ。',
          '週末の予定、まだ空いていたらカフェに行こうと思っています。',
          '駅から近い場所をいくつか見つけたので、都合のいい方を選んでもらえたらうれしいです。'
        ]
      },
      {
        id: 4,
        sender: 'Security Alert',
        email: 'no-reply@security.jp',
        subject: '新しい端末からのログインがありました',
        snippet: '心当たりがない場合は、すぐにパスワードを変更してください。',
        time: '1時間前',
        date: '今日',
        label: 'alert',
        tag: 'alert',
        unread: true,
        starred: false,
        body: [
          '新しい端末からのログインを検知しました。',
          '心当たりがない場合は、アカウント設定からパスワードを変更し、二段階認証を有効にしてください。',
          'この通知に返信する必要はありません。'
        ]
      },
      {
        id: 5,
        sender: 'Nakamura',
        email: 'naka@example.com',
        subject: '資料の確認ありがとうございました',
        snippet: '改善点の指摘、すごく助かりました。次の版に反映します。',
        time: '月曜',
        date: '月曜',
        label: 'work',
        tag: 'work',
        unread: false,
        starred: false,
        body: [
          'レビューありがとうございました。',
          'いただいたフィードバックをもとに、次の版では可読性と余白を調整します。',
          '引き続きよろしくお願いします。'
        ]
      }
    ];

    const state = {
      activeId: 1,
      filter: 'all',
      folder: 'inbox',
      label: 'all',
      query: ''
    };

    const mailList = document.getElementById('mailList');
    const reader = document.getElementById('reader');
    const unreadCount = document.getElementById('unreadCount');
    const searchInput = document.getElementById('searchInput');
    const composeModal = document.getElementById('composeModal');

    function initials(name) {
      return name
        .replace(/\//g, ' ')
        .split(/\s+/)
        .filter(Boolean)
        .map(s => s[0])
        .slice(0, 2)
        .join('')
        .toUpperCase();
    }

    function updateUnreadCount() {
      unreadCount.textContent = mails.filter(m => m.unread).length;
    }

    function matchesFilter(mail) {
      const q = state.query.trim().toLowerCase();
      const matchesQuery = !q || [mail.sender, mail.subject, mail.snippet, mail.email].join(' ').toLowerCase().includes(q);
      const matchesLabel = state.label === 'all' || mail.label === state.label;
      const matchesChip =
        state.filter === 'all' ||
        (state.filter === 'unread' && mail.unread) ||
        (state.filter === 'starred' && mail.starred) ||
        (state.filter === 'today' && mail.date === '今日');
      return matchesQuery && matchesLabel && matchesChip;
    }

    function renderList() {
      const visible = mails.filter(matchesFilter);
      mailList.innerHTML = visible.map(mail => `
        <article class="mail-item ${mail.id === state.activeId ? 'active' : ''}" data-id="${mail.id}">
          <div class="mail-row">
            <div class="mail-main">
              <p class="sender">
                ${mail.sender}
                ${mail.unread ? '<span class="muted-dot" title="未読"></span>' : ''}
              </p>
              <p class="subject">${mail.subject}</p>
              <p class="snippet">${mail.snippet}</p>
            </div>
            <div class="meta">
              <span>${mail.time}</span>
              <span class="tag ${mail.tag}">${mail.label}</span>
            </div>
          </div>
        </article>
      `).join('') || `
        <div class="empty">
          <div class="empty-card">
            <div class="empty-state-icon">📭</div>
            <h3 style="margin:0 0 8px; color:#0f172a;">該当するメールがありません</h3>
            <p style="margin:0; line-height:1.7;">検索語かフィルタを変えると、たぶん業務っぽい画面に戻ります。</p>
          </div>
        </div>
      `;

      mailList.querySelectorAll('.mail-item').forEach(item => {
        item.addEventListener('click', () => {
          state.activeId = Number(item.dataset.id);
          const mail = mails.find(m => m.id === state.activeId);
          if (mail) mail.unread = false;
          updateUnreadCount();
          renderAll();
        });
      });
    }

    function renderReader() {
      const mail = mails.find(m => m.id === state.activeId) || mails[0];
      if (!mail) {
        reader.innerHTML = '<div class="empty"><div class="empty-card">メールがありません。</div></div>';
        return;
      }

      reader.innerHTML = `
        <h2>${mail.subject}</h2>
        <div class="reader-info">
          <div class="sender-block">
            <div class="avatar">${initials(mail.sender)}</div>
            <div class="sender-meta">
              <div class="name">${mail.sender}</div>
              <div>${mail.email}</div>
            </div>
          </div>
          <div>${mail.date} ・ ${mail.time}</div>
        </div>
        <div class="message">
          <div class="message-body">
            ${mail.body.map(p => `<p>${p}</p>`).join('')}
            <div class="signature">
              送信元: ${mail.sender}<br />
              ラベル: ${mail.label}
            </div>
          </div>
        </div>
      `;
    }

    function syncActiveButtons() {
      document.querySelectorAll('.chip').forEach(chip => chip.classList.toggle('active', chip.dataset.filter === state.filter));
      document.querySelectorAll('.nav-item[data-label]').forEach(item => item.classList.toggle('active', item.dataset.label === state.label));
      document.querySelectorAll('.nav-item[data-folder]').forEach(item => item.classList.toggle('active', item.dataset.folder === state.folder));
    }

    function renderAll() {
      renderList();
      renderReader();
      syncActiveButtons();
    }

    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        state.filter = chip.dataset.filter;
        renderAll();
      });
    });

    document.querySelectorAll('.nav-item[data-label]').forEach(item => {
      item.addEventListener('click', () => {
        state.label = item.dataset.label;
        renderAll();
      });
    });

    document.querySelectorAll('.nav-item[data-folder]').forEach(item => {
      item.addEventListener('click', () => {
        state.folder = item.dataset.folder;
        renderAll();
      });
    });

    searchInput.addEventListener('input', (e) => {
      state.query = e.target.value;
      renderAll();
    });

    document.getElementById('markAllRead').addEventListener('click', () => {
      mails.forEach(m => m.unread = false);
      updateUnreadCount();
      renderAll();
    });

    document.getElementById('refreshBtn').addEventListener('click', () => {
      state.query = '';
      searchInput.value = '';
      renderAll();
    });

    document.getElementById('replyBtn').addEventListener('click', () => openCompose());
    document.getElementById('openCompose').addEventListener('click', () => openCompose());
    document.getElementById('closeCompose').addEventListener('click', closeCompose);

    document.getElementById('sendBtn').addEventListener('click', () => {
      alert('送信しました。珍しく、かなり業務アプリっぽい挙動です。');
      closeCompose();
    });

    document.getElementById('deleteBtn').addEventListener('click', () => {
      const idx = mails.findIndex(m => m.id === state.activeId);
      if (idx >= 0) {
        mails.splice(idx, 1);
        state.activeId = mails[0]?.id || null;
        updateUnreadCount();
        renderAll();
      }
    });

    document.getElementById('archiveBtn').addEventListener('click', () => {
      alert('アーカイブしました。画面は片付きましたが、仕事は片付いていません。');
    });

    composeModal.addEventListener('click', (e) => {
      if (e.target === composeModal) closeCompose();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeCompose();
    });

    function openCompose() {
      composeModal.classList.add('open');
      composeModal.setAttribute('aria-hidden', 'false');
    }

    function closeCompose() {
      composeModal.classList.remove('open');
      composeModal.setAttribute('aria-hidden', 'true');
    }

    updateUnreadCount();
    renderAll();
  </script>
</body>
</html>
